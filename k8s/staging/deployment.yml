kind: Deployment 
apiVersion: apps/v1 
metadata:
  name: fastapi-app
  namespace: staging
  labels:
    app: fastapi-app
    env: staging
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: fastapi-app
      environment: staging 
  template:
    metadata:
      labels:
        app: fastapi-app
        environment: staging
    spec:
      containers:
        - name: fastapi-app
          image: amandabral9954/fastapi-app:124
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: staging
            - name: VERSION
              value: "2.0.0"
            - name: FAIL_HEALTH
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
