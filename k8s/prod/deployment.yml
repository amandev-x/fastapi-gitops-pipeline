apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: prod
  labels:
    app: fastapi-app
    environment: prod
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: fastapi-app
  template:
    metadata:
      labels:
        app: fastapi-app
        environment: prod
    spec:
      containers:
      - name: fastapi-app
        image: amandabral9954/fastapi-app:75
        ports:
        - containerPort: 8000
        env:
          - name: ENVIRONMENT
            value: production
          - name: VERSION
            value: "2.0.0"
          - name: FAIL_HEALTH
            value: "false"
        imagePullPolicy: IfNotPresent 
        resources:
          requests:
            memory: "150Mi"
            cpu: "150m"
          limits:
            memory: "350Mi"
            cpu: "350m"
        livenessProbe:
          httpGet:
            path: /health 
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
